<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#e74c3c;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:0"/>
    </linearGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <!-- Scan lines -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="20" x2="800" y2="20"/>
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="140" x2="800" y2="140"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
  </g>

  <!-- Glow line -->
  <rect x="80" y="150" width="640" height="2" rx="1" fill="url(#glow)"/>
  <rect x="80" y="150" width="640" height="2" rx="1" fill="url(#glow)" filter="url(#softglow)"/>

  <!-- Eye icon -->
  <g transform="translate(140, 60)">
    <!-- Outer eye -->
    <path d="M0 40 Q40 0 80 40 Q40 80 0 40 Z" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <!-- Iris -->
    <circle cx="40" cy="40" r="16" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <!-- Pupil -->
    <circle cx="40" cy="40" r="6" fill="url(#accent)"/>
    <!-- Scan beam -->
    <line x1="40" y1="0" x2="40" y2="12" stroke="#e74c3c" stroke-width="1.5" opacity="0.6"/>
    <line x1="40" y1="68" x2="40" y2="80" stroke="#f39c12" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="270" y="95" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="6">SENTINEL</text>

  <!-- Subtitle -->
  <text x="270" y="125" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#8b8ba7" letter-spacing="5" font-weight="300">BEHAVIORAL GUARDRAILS FOR CLAUDE CODE</text>

  <!-- Status indicators -->
  <g transform="translate(270, 145)" font-family="'SF Mono', 'Fira Code', monospace" font-size="9">
    <!-- Gate -->
    <rect width="8" height="8" rx="4" fill="#2ecc71"/>
    <text x="12" y="8" fill="#6b7280">GATE</text>
    <!-- Secret Scan -->
    <rect x="60" width="8" height="8" rx="4" fill="#2ecc71"/>
    <text x="72" y="8" fill="#6b7280">SECRETS</text>
    <!-- Memory -->
    <rect x="140" width="8" height="8" rx="4" fill="#2ecc71"/>
    <text x="152" y="8" fill="#6b7280">MEMORY</text>
    <!-- Doctor -->
    <rect x="220" width="8" height="8" rx="4" fill="#f39c12"/>
    <text x="232" y="8" fill="#6b7280">DOCTOR</text>
    <!-- Compaction -->
    <rect x="300" width="8" height="8" rx="4" fill="#2ecc71"/>
    <text x="312" y="8" fill="#6b7280">COMPACTION</text>
  </g>
</svg>
